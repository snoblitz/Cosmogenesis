<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="18%" stop-color="#ffe6a8" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#c7b6ff" stop-opacity="0.55"/>
      <stop offset="75%" stop-color="#5a3fbf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#0a0820" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020108" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- faint distant stars -->
  <circle cx="12" cy="14" r="0.8" fill="#c7b6ff" opacity="0.6"/>
  <circle cx="52" cy="18" r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="48" cy="48" r="0.7" fill="#c7b6ff" opacity="0.5"/>
  <circle cx="14" cy="50" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="32" cy="10" r="0.4" fill="#ffd49b" opacity="0.5"/>
  <!-- central cradle igniting -->
  <circle cx="32" cy="32" r="22" fill="url(#halo)"/>
  <circle cx="32" cy="32" r="3.2" fill="#ffffff"/>
</svg>
